<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#F8F9FA" />
    <title>RSS Personal Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="topbar__brand">
                <button class="icon-button topbar__menu" type="button" id="menuButton" aria-label="Open navigation" data-i18n-aria-label="openNavigation" aria-expanded="false" aria-controls="sidebarDrawer">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h1 data-i18n="appTitle">RSS Reader</h1>
            </div>

            <div class="topbar__actions">
                <button class="lang-toggle" type="button" id="langToggle" aria-label="Switch language">EN</button>

                <button class="theme-toggle" type="button" id="themeToggle" aria-label="Toggle dark mode" data-i18n-aria-label="toggleDarkMode">
                    <i class="bi bi-sun-fill theme-toggle__icon--sun" aria-hidden="true"></i>
                    <i class="bi bi-moon-stars-fill theme-toggle__icon--moon" aria-hidden="true"></i>
                </button>

                <label class="search" for="searchInput">
                    <span class="search__icon" aria-hidden="true">⌕</span>
                    <input id="searchInput" type="search" placeholder="Search articles or feeds" data-i18n-placeholder="searchPlaceholder" autocomplete="off" />
                </label>
                <button class="primary-button" type="button" id="refreshAllButton" data-i18n="refreshAll">Refresh all</button>
                <p class="topbar__meta" id="topbarStat" aria-live="polite">0 feeds · 0 articles · updated —</p>
            </div>
        </header>

        <div class="app-layout">
            <aside class="sidebar" id="sidebarDrawer" aria-label="Feed navigation">
                <section class="sidebar__section sidebar__section--profile">
                    <div>
                        <h2 data-i18n="subscriptions">Subscriptions</h2>
                    </div>
                    <p class="sidebar__description" data-i18n="sidebarDescription">Add a feed URL, refresh sources, or remove one you do not need.</p>
                </section>

                <section class="sidebar__section">
                    <div class="section-heading">
                        <h3 data-i18n="addFeed">Add feed</h3>
                    </div>
                    <form id="addFeedForm" class="feed-form">
                        <label class="field">
                            <span data-i18n="feedUrlLabel">RSS or Atom URL</span>
                            <input id="feedUrlInput" name="url" type="url" placeholder="https://example.com/rss.xml" required />
                        </label>
                        <button class="primary-button primary-button--full" type="submit" data-i18n="addFeed">Add feed</button>
                        <p class="form-message" id="feedFormMessage" role="status" aria-live="polite"></p>
                    </form>
                </section>

                <section class="sidebar__section sidebar__section--feeds">
                    <div class="section-heading">
                        <h3 data-i18n="subscriptions">Subscriptions</h3>
                    </div>
                    <div class="feed-list" id="feedList"></div>
                </section>
            </aside>

            <main class="content">
                <section class="daily-summary" id="dailySummaryCard" hidden>
                    <div class="daily-summary__header">
                        <h3 data-i18n="dailySummaryTitle">Daily News Summary</h3>
                        <div class="daily-summary__actions">
                            <button type="button" class="icon-button daily-summary__refresh" id="dailySummaryRefresh" aria-label="Refresh summary" data-i18n-aria-label="refreshSummaryAria">
                                <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div class="daily-summary__body" id="dailySummaryBody"></div>
                    <button type="button" class="daily-summary__toggle" id="dailySummaryToggle" hidden data-i18n="showMore">Show more</button>
                </section>

                <section class="river-toolbar">
                    <h2 data-i18n="latestArticles">Latest articles</h2>
                    <p class="toolbar-meta" id="statusText" data-i18n="loadingFeeds">Loading feeds and articles...</p>
                </section>

                <div class="category-pills" id="categoryPills"></div>

                <section class="river" id="articleFeed" aria-label="Articles" data-i18n-aria-label="articlesAriaLabel"></section>

                <nav class="pagination" id="paginationBar" aria-label="Pagination" hidden>
                    <button type="button" class="pagination__button" id="paginationPrev" data-i18n="previous">Previous</button>
                    <span class="pagination__status" id="paginationStatus"></span>
                    <button type="button" class="pagination__button pagination__button--primary" id="paginationNext" data-i18n="next">Next</button>
                    <label class="pagination__jump">
                        <span data-i18n="jumpTo">Jump to</span>
                        <input type="number" id="paginationJumpInput" min="1" step="1" />
                    </label>
                </nav>
            </main>
        </div>

        <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>

        <button class="help-fab" type="button" id="helpFabButton" aria-label="Open help" data-i18n-aria-label="openHelp" aria-expanded="false" aria-controls="helpPanel">
            <i class="bi bi-question-lg" aria-hidden="true"></i>
        </button>

        <div class="help-panel" id="helpPanel" role="dialog" aria-label="Help" aria-modal="false" hidden>
            <div class="help-panel__header">
                <h3 data-i18n="helpHeading">How can we help?</h3>
                <button class="icon-button" type="button" id="helpCloseButton" aria-label="Close help" data-i18n-aria-label="closeHelp">
                    <i class="bi bi-x-lg" aria-hidden="true"></i>
                </button>
            </div>
            <label class="field help-panel__search">
                <span class="visually-hidden" data-i18n="searchHelpTopics">Search help topics</span>
                <input id="helpSearchInput" type="search" placeholder="Search help topics" data-i18n-placeholder="searchHelpTopics" autocomplete="off" />
            </label>
            <div class="help-panel__list" id="helpTopicList"></div>
        </div>

        <button class="chat-fab" type="button" id="chatFabButton" aria-label="Open AI assistant" data-i18n-aria-label="openAssistant" aria-expanded="false" aria-controls="chatPanel">
            <i class="bi bi-stars" aria-hidden="true"></i>
        </button>

        <div class="chat-panel" id="chatPanel" role="dialog" aria-label="AI assistant" aria-modal="false" hidden>
            <div class="chat-panel__header">
                <h3 data-i18n="askAssistant">Ask the assistant</h3>
                <button class="icon-button" type="button" id="chatCloseButton" aria-label="Close AI assistant" data-i18n-aria-label="closeAssistant">
                    <i class="bi bi-x-lg" aria-hidden="true"></i>
                </button>
            </div>
            <div class="chat-panel__messages" id="chatMessages" aria-live="polite"></div>
            <form class="chat-panel__form" id="chatForm">
                <label class="field chat-panel__field">
                    <span class="visually-hidden" data-i18n="askQuestion">Ask a question</span>
                    <input id="chatInput" type="text" placeholder="Ask a question..." data-i18n-placeholder="askQuestionPlaceholder" autocomplete="off" dir="auto" />
                </label>
                <button class="icon-button chat-panel__send" type="submit" aria-label="Send message" data-i18n-aria-label="sendMessage">
                    <i class="bi bi-send-fill" aria-hidden="true"></i>
                </button>
            </form>
        </div>
    </div>

    <template id="feedItemTemplate">
        <button type="button" class="feed-item">
            <div class="feed-item__main">
                <strong class="feed-item__title"></strong>
                <span class="feed-item__meta"></span>
            </div>
            <span class="feed-item__badge"></span>
        </button>
    </template>

    <template id="articleCardTemplate">
        <article class="article-card card">
            <div class="article-card__media" hidden>
                <img class="article-card__image" alt="" loading="lazy" referrerpolicy="no-referrer" />
            </div>
            <div class="article-card__body">
                <div class="article-card__header">
                    <p class="article-card__source"></p>
                    <h4 class="article-card__title"></h4>
                </div>
                <p class="article-card__summary"></p>
                <div class="article-card__footer">
                    <div class="article-card__footer-meta">
                        <span class="article-card__feed"></span>
                        <time class="article-card__time"></time>
                    </div>
                    <div class="article-card__actions">
                        <button type="button" class="icon-button article-card__favorite" aria-label="Save to favorites">
                            <i class="bi bi-star" aria-hidden="true"></i>
                        </button>
                        <button type="button" class="icon-button article-card__share" aria-label="Copy article link">
                            <i class="bi bi-share" aria-hidden="true"></i>
                        </button>
                        <a class="article-card__link" target="_blank" rel="noreferrer noopener">Read article</a>
                    </div>
                </div>
            </div>
        </article>
    </template>

    <script src="/js/app.js" defer></script>
</body>
</html>
